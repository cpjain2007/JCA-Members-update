# docker-compose.yml
#
# 1. Copy .env.example to .env and fill in the Firebase web config values.
# 2. Place serviceAccount.json at the repo root (for the Python CLI).
# 3. docker compose up -d web       (serves the SPA on http://localhost:8080)
# 4. docker compose run --rm scripts python scripts/export_member_changes.py \
#      --output /app/data/Modified_And_New_Members.xlsx

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    image: jca-members-web:latest
    container_name: jca-members-web
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

  scripts:
    build:
      context: .
      dockerfile: Dockerfile
    image: jca-members-scripts:latest
    container_name: jca-members-scripts
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/serviceAccount.json
    volumes:
      - ./serviceAccount.json:/app/serviceAccount.json:ro
      - ./data:/app/data
    # Default to a harmless message; override with `docker compose run --rm scripts <cmd>`.
    command: >-
      python -c "print('Run with: docker compose run --rm scripts python scripts/<script>.py')"
    profiles:
      - cli
